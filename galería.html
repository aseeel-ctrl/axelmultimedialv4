

<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Galería</title>
<link rel="icon" href="img/futuro.jpeg" type="image/jpeg">

<style>


body{
  margin: 0;
  background-color: #77b8ba;
  font-family: "Courier New", monospace;
}


body::before{
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-image: url("img/i14.jpg"); 
  background-size: cover;
  background-position: center;

  opacity: 0.2;
  z-index: -1;
}


.container{
  display: flex;
  min-height: 100vh; 
}


.sidebar{
  width: 200px;
  background-color: rgba(219,190,227,0.6);
  padding: 50px;

  display: flex;
  flex-direction: column;
  gap: 20px;
}

.sidebar a{
  text-decoration: none;
  color: rgb(50, 2, 55);
  font-size: 25px;
  border-bottom: 1px solid rgba(0,0,0,0.3);
  padding-bottom: 5px;
}


.main{
    border-radius: 3px;
    width: 80%;
    max-width: 800px;
    margin: 1rem auto;
    font-family: 'Courier Prime', monospace;
    overflow: hidden;
}
}

.bloque{
  background-color: rgba(255,255,255,0.2);
  padding: 80px;
  border: 2px solid #dbbee3;
  text-align: center;
}


.bloque h1{
  font-family: 'Courier New', monospace;;
  font-size: 50px;
  color: rgb(50, 2, 55);
  margin-bottom: 40px;
}


   .thread {
        background-color: #fae1a7d3;
     border: 2px solid #014a18;
     border-radius: 3px;
     width: 80%;
     max-width: 800px;
     margin: 1rem auto;
     font-family: 'Courier Prime', monospace;
     overflow: hidden;
    }

   .thread-header {
  background-color: #014a18;
  color: #fff3d2;
  padding: 0.3rem 1.2rem;
  font-size: 1rem;
}
  .thread-texto {
      background-color: #fae1a7d3;
     color: #014a18;
     padding: 1rem 1.2rem;
     font-size: 0.8rem;
    }
  .thread-grid {
     display: grid;
     grid-template-columns: repeat(4, 1fr);
     gap: 1rem;
     padding-top: 1rem;
    }

  .thread-box {
     padding: 0.5rem;
     text-align: center;
     font-size: 0.9rem;
     color: #014a18;
}

  .thread-box img {
     width: 100%;
     height: 300px; /* Alto uniforme */
     object-fit: cover; /* Recorta manteniendo proporción */
     border-radius: 3px;
     margin-bottom: 1rem;
     margin-left: 0.5rem;
     margin-right: 0.5rem;
     box-shadow: 0 0 4px rgba(0, 0, 0, 0.2); /* Opcional para dar profundidad */
}

</style>

</head>

<body>

<div class="container">


  <div class="sidebar">
    <a href="index.html">Volver</a> 

  </div>


  <div class="main">
  
    <div class="bloque">
      <h1>GALERÍA</h1>
    <div class="thread-grid">
      <div class="thread-box">
        <img src="img/i1.jpg">
        <p> "Recomendados" (2026)</p>
      </div>
      <div class="thread-box">
        <img src="img/i2.jpg">
        <p> "Recomendados" (2026)</p>   
      </div>
       <div class="thread-box">
        <img src="img/i3.png">
       </div>
    <div class="thread-box">
        <img src="img/i4.png">
    </div>
    <div class="thread-box">
        <img src="img/i5.jpg">
    </div>
    <div class="thread-box">
        <img src="img/i6.jpg">
    </div>
     <div class="thread-box">
        <img src="img/i7.jpg">
     </div>
     <div class="thread-box">
        <img src="img/i8.JPG">
     </div>
      <div class="thread-box">
        <img src="img/i9.JPG">
      </div>
       <div class="thread-box">
        <img src="img/i10.jpg">
       </div>
       <div class="thread-box">

       </div>
       <div class="thread-box">

       </div>
       <div class="thread-box">

       <div class="thread-box">

    </div>

</div>

</body>
</html>
